name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  ci:
    name: Node ${{ matrix.node }} · lint/test/build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack (dry-run)
        shell: bash
        run: |
          set -euo pipefail
          rm -f *.tgz
          npm pack

      - name: Verify tarball contains dist + types
        shell: bash
        run: |
          set -euo pipefail

          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TGZ="${NAME}-${VERSION}.tgz"

          echo "Tarball: $TGZ"
          test -f "$TGZ" || { echo "Tarball not found: $TGZ"; ls -la; exit 1; }

          tar -tf "$TGZ" > contents.txt

          echo "Tarball contents:"
          cat contents.txt

          grep -Fxq 'package/dist/types/index.d.ts' contents.txt || { echo "Missing package/dist/types/index.d.ts"; exit 1; }
          grep -Fxq 'package/dist/esm/index.js' contents.txt || { echo "Missing package/dist/esm/index.js"; exit 1; }
          grep -Fxq 'package/dist/cjs/index.cjs' contents.txt || { echo "Missing package/dist/cjs/index.cjs"; exit 1; }

  release:
    name: Create GitHub Release
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section for tag
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES_FILE="release-notes.md"

          # Extract the section between "## [VERSION]" and the next "## [" heading,
          # or the "---" separator line, whichever comes first.
          awk -v ver="$VERSION" '
            BEGIN { found=0 }
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found && /^---[ \t]*$/ { exit }
            found { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [ -s "$NOTES_FILE" ]; then
            echo "Extracted changelog section for $VERSION"
            echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changelog section found for $VERSION; falling back to auto-generated notes"
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.has_notes == 'true' && steps.changelog.outputs.notes_file || null }}
          generate_release_notes: ${{ steps.changelog.outputs.has_notes != 'true' }}
